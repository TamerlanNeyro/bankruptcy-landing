<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гучигов Тимерлан Хасанович</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent3: #06b6d4;
    --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* ── Фоновые частицы ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Орбитальные кольца ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: .35;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, #7c3aed 0%, transparent 70%); top: -160px; left: -160px; animation-duration: 16s; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #06b6d4 0%, transparent 70%); bottom: -120px; right: -120px; animation-duration: 20s; animation-delay: -6s; }
  .orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, #a855f7 0%, transparent 70%); top: 40%; left: 40%; animation-duration: 12s; animation-delay: -3s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 40px) scale(1.08); }
  }

  /* ── Центровка ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Карточка ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 44px 48px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 0 0 1px rgba(124,58,237,.15),
      0 24px 64px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.07);
    animation: fadeUp .8s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Аватар-монограмма ── */
  .avatar {
    width: 88px;
    height: 88px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    position: relative;
    animation: pulse-ring 3s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(124,58,237,.5);
  }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(124,58,237,.45), 0 0 32px rgba(124,58,237,.3); }
    50%  { box-shadow: 0 0 0 14px rgba(124,58,237,0), 0 0 48px rgba(124,58,237,.5); }
    100% { box-shadow: 0 0 0 0 rgba(124,58,237,.45), 0 0 32px rgba(124,58,237,.3); }
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    z-index: -1;
    filter: blur(10px);
    opacity: .7;
  }

  /* ── Имя ── */
  .name {
    text-align: center;
    font-size: clamp(1.35rem, 4.5vw, 1.75rem);
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -.5px;
    background: linear-gradient(135deg, #e2d9f3 0%, #a78bfa 40%, #38bdf8 80%, #e2d9f3 100%);
    background-size: 250% 250%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s linear infinite;
    filter: drop-shadow(0 0 18px rgba(124,58,237,.55));
    margin-bottom: 14px;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Разделитель ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent3), transparent);
    margin: 0 auto 18px;
    width: 70%;
    opacity: .6;
  }

  /* ── Специализация ── */
  .spec {
    text-align: center;
    font-size: .92rem;
    font-weight: 500;
    color: rgba(255,255,255,.55);
    letter-spacing: .6px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .spec span {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }

  /* ── Соцсети ── */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 36px;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: rgba(255,255,255,.6);
    text-decoration: none;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1),
                background .25s, border-color .25s, color .25s, box-shadow .25s;
    position: relative;
    overflow: hidden;
  }

  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity .25s;
  }

  .social-btn.tg::before  { background: linear-gradient(135deg, #0088cc, #00c6ff); }

  .social-btn:hover {
    transform: translateY(-5px) scale(1.12);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 10px 32px rgba(0,0,0,.4), 0 0 24px rgba(124,58,237,.4);
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn svg { position: relative; z-index: 1; }

  /* ── CTA кнопка ── */
  .cta {
    display: block;
    width: 100%;
    padding: 15px 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .3px;
    color: #fff;
    text-decoration: none;
    text-align: center;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    background-size: 200% 200%;
    animation: bg-pan 4s ease infinite;
    box-shadow: 0 4px 24px rgba(124,58,237,.45), inset 0 1px 0 rgba(255,255,255,.15);
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
    position: relative;
    overflow: hidden;
  }

  .cta::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 0%, rgba(255,255,255,.18) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform .5s ease;
  }

  .cta:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 40px rgba(124,58,237,.6), inset 0 1px 0 rgba(255,255,255,.2); }
  .cta:hover::after { transform: translateX(100%); }
  .cta:active { transform: translateY(0) scale(.98); }

  @keyframes bg-pan {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Тег-бейдж ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,58,237,.15);
    border: 1px solid rgba(124,58,237,.3);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 600;
    color: #a78bfa;
    margin: 0 auto 32px;
    letter-spacing: .3px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    animation: blink 1.8s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  .center { display: flex; justify-content: center; }

  /* ── Адаптив ── */
  @media (max-width: 520px) {
    .card { padding: 40px 28px 36px; border-radius: 22px; }
    .avatar { width: 76px; height: 76px; font-size: 26px; }
  }
  @media (max-width: 360px) {
    .card { padding: 32px 18px 28px; }
  }
</style>
</head>
<body>

<!-- Фоновые сферы -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Анимированные частицы на canvas -->
<canvas class="bg-canvas" id="stars"></canvas>

<div class="page">
  <div class="card">

    <!-- Монограмма -->
    <div class="avatar">ТГ</div>

    <!-- Имя -->
    <h1 class="name">Гучигов Тимерлан&nbsp;Хасанович</h1>

    <div class="divider"></div>

    <!-- Специализация -->
    <p class="spec"><span>Банкротство физических лиц</span></p>

    <!-- Статус -->
    <div class="center">
      <div class="badge">
        <span class="badge-dot"></span>
        Доступен для консультации
      </div>
    </div>

    <!-- Иконки соцсетей -->
    <div class="socials">
      <!-- Telegram -->
      <a href="https://t.me/spisanie_deneg" target="_blank" rel="noopener" class="social-btn tg" title="Telegram">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M21.944 2.506a1.5 1.5 0 00-1.556-.217L2.46 9.854a1.5 1.5 0 00.08 2.79l3.967 1.322 1.944 5.833a1 1 0 001.755.268l2.401-2.889 4.128 3.02a1.5 1.5 0 002.314-.9l2.5-15.5a1.5 1.5 0 00-.605-1.292zM10 16.5l-1-3.5 8-6-7 7z" fill="currentColor"/>
        </svg>
      </a>
    </div>

    <!-- CTA -->
    <a href="https://t.me/spisanie_deneg" target="_blank" rel="noopener" class="cta">
      ✉&nbsp;&nbsp;Написать мне
    </a>

  </div>
</div>

<script>
  /* ── Звёздный фон ── */
  (function () {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    const N = 120;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      stars = Array.from({ length: N }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + .3,
        a: Math.random(),
        da: (Math.random() - .5) * .006,
        dx: (Math.random() - .5) * .18,
        dy: (Math.random() - .5) * .18,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        s.x += s.dx; s.y += s.dy; s.a += s.da;
        if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
        if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
        if (s.a <= 0 || s.a >= 1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,180,255,${s.a * .7})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); });
    init();
    draw();
  })();
</script>
</body>
</html>
